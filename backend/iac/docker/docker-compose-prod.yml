services:
  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: build
    environment:
      NODE_ENV: production
      DATABASE_URL_CORE: ${DATABASE_URL_CORE}
      DIRECT_URL_CORE: ${DIRECT_URL_CORE}
      DATABASE_URL_PRODUCTS: ${DATABASE_URL_PRODUCTS}
      DIRECT_URL_PRODUCTS: ${DIRECT_URL_PRODUCTS}
      DATABASE_URL_IDENTITY: ${DATABASE_URL_IDENTITY}
      DIRECT_URL_IDENTITY: ${DIRECT_URL_IDENTITY}
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        CORE_DB_BASE="$${DIRECT_URL_CORE%%\?*}"
        PRODUCTS_DB_BASE="$${DIRECT_URL_PRODUCTS%%\?*}"
        IDENTITY_DB_BASE="$${DIRECT_URL_IDENTITY%%\?*}"
        psql "$$CORE_DB_BASE" -v ON_ERROR_STOP=1 -c 'CREATE SCHEMA IF NOT EXISTS "core";'
        psql "$$PRODUCTS_DB_BASE" -v ON_ERROR_STOP=1 -c 'CREATE SCHEMA IF NOT EXISTS "products";'
        psql "$$IDENTITY_DB_BASE" -v ON_ERROR_STOP=1 -c 'CREATE SCHEMA IF NOT EXISTS "identity";'
        npx prisma migrate deploy --schema libs/core/src/providers/prisma/schema.prisma
        npx prisma migrate deploy --schema libs/products/src/infrastructure/prisma/schema.prisma
        npx prisma migrate deploy --schema libs/identity/src/infrastructure/prisma/schema.prisma
    restart: 'no'

  app:
    image: modular-monolith-app-console:latest
    build:
      context: ../..
      dockerfile: Dockerfile
      target: runtime
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL_CORE: ${DATABASE_URL_CORE}
      DIRECT_URL_CORE: ${DIRECT_URL_CORE}
      DATABASE_URL_PRODUCTS: ${DATABASE_URL_PRODUCTS}
      DIRECT_URL_PRODUCTS: ${DIRECT_URL_PRODUCTS}
      DATABASE_URL_IDENTITY: ${DATABASE_URL_IDENTITY}
      DIRECT_URL_IDENTITY: ${DIRECT_URL_IDENTITY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORE_LOG_FILE_PATH: /tmp/core.log
      PRODUCTS_LOG_FILE_PATH: /tmp/products.log
      IDENTITY_LOG_FILE_PATH: /tmp/identity.log
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
